<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Clone</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
  </div>

  <div class="search_box">
    <input type="text" placeholder="Search Amazon.in">
    <button><i class="fa fa-search"></i></button>
  </div>

  <div class="nav-right">
    <p>Hello, Sign in</p>
    <p>Orders</p>
    <p><i class="fa fa-shopping-cart"></i> Cart</p>
  </div>
</nav>

<!-- HERO SECTION -->
<div class="hero"></div>

<!-- PRODUCTS -->
<div class="cards">

  <div class="card">
    <h3>Smart Watches</h3>
    <img src="https://m.media-amazon.com/images/I/61ZjlBOp+rL._SX679_.jpg">
    <p>Starting ₹1,999</p>
    <a href="#">Shop Now</a>
  </div>

  <div class="card">
    <h3>Headphones</h3>
    <img src="https://cdn.pixabay.com/photo/2020/04/19/16/33/headphones-5064411_1280.jpg">
    <p>Up to 70% Off</p>
    <a href="#">See Deals</a>
  </div>

  <div class="card">
    <h3>Home Decor</h3>
    <img src="https://m.media-amazon.com/images/I/81QpkIctqPL._SX679_.jpg">
    <p>Explore Now</p>
    <a href="#">Explore</a>
  </div>

  <div class="card">
    <h3>Gaming Accessories</h3>
    <img src="https://m.media-amazon.com/images/I/61CGHv6kmWL._SX679_.jpg">
    <p>Starting ₹999</p>
    <a href="#">Shop Now</a>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Amazon Clone | Made for Practice</p>
</footer>

</body>
</html>
